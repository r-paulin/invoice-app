  <div class="page-surface export-page">
    <header class="top export-header">
      <div class="header-grid container">
        <a href="./" class="logo-link" aria-label="Invossa home">
          <img class="logo header-grid__logo" src="../assets/logo-invio.svg" alt="Invossa" width="114" height="42">

    </header>
    <main class="export-main" id="export-ready-main" role="main">
      <div class="export-state-content export-ready-content">
        <div class="export-illustration" aria-hidden="true">
          <img src="../assets/paper-stack-flying.png" alt="" width="320" height="320">
        </div>
        <h1 class="export-title">Invoice ready</h1>
        <p class="export-subtitle">You can download your invoice now</p>
        <div class="export-actions">
          <button type="button" class="btn btn--primary" id="export-download-xml" aria-label="Download XML invoice">Download XML</button>
          <button type="button" class="btn btn--primary" id="export-download-pdf" aria-label="Download PDF invoice">Download PDF</button>
        </div>
        <div class="export-actions export-actions-secondary">
          <a href="./" class="btn btn--secondary btn--icon-left" id="export-new-invoice">
            <span class="material-symbols-rounded btn__icon" aria-hidden="true">add</span>
            <span class="btn__label">Create new invoice</span>
          </a>
        </div>
        <p class="export-validation-hint">After downloading the XML, you can <a href="https://www.itb.ec.europa.eu/invoice/upload" target="_blank" rel="noopener noreferrer" id="export-ec-validator-link">validate it with the European Commission eInvoicing validator</a>.</p>
      </div>
    </main>
