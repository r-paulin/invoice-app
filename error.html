<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = window.location.pathname || '';
      if (path.indexOf('/invoice-app') === 0) {
        var base = document.createElement('base');
        base.href = '/invoice-app/';
        document.head.insertBefore(base, document.head.firstChild);
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something went wrong – Invossa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&display=block">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <a href="#export-error-main" class="skip-link">Skip to main content</a>
  <div class="page-surface export-page">
    <main class="export-main" id="export-error-main" role="main">
      <div class="export-state-content export-error-content">
        <a href="index.html" class="export-logo-link" aria-label="Invossa home">
          <img class="export-logo" src="assets/img/Invossa.svg" alt="Invossa" width="124" height="31">
        </a>
        <div class="export-illustration export-error-illustration" aria-hidden="true">
          <img src="assets/img/invoice-error.webp" alt="" width="401" height="267">
        </div>
        <h1 class="export-title">That didn't work</h1>
        <p class="export-subtitle" id="export-error-message">Your invoice wasn't created. Try again.</p>
        <div class="export-actions">
          <a href="index.html" class="btn btn--primary" id="export-try-again">Try again</a>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/export.js"></script>
</body>
</html>
