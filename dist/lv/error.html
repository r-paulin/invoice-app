<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = window.location.pathname || '';
      if (path.indexOf('/invoice-app') === 0) {
        var base = document.createElement('base');
        base.href = '/invoice-app/';
        document.head.insertBefore(base, document.head.firstChild);
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="assets/img/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="shortcut icon" href="assets/img/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="Invoce">
  <link rel="manifest" href="assets/img/site.webmanifest">
  <title>Something went wrong – Invoce</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&display=block">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <a href="#export-error-main" class="skip-link">Skip to main content</a>
  <div class="page-surface export-page">
    <main class="export-main" id="export-error-main" role="main">
      <div class="export-state-content export-error-content">
        <a href="index.html" class="export-logo-link" aria-label="Invoce home">
          <img class="export-logo" src="assets/img/Logotype.svg" alt="Invoce" width="140" height="40">
        </a>
        <div class="export-illustration export-error-illustration" aria-hidden="true">
          <img src="assets/img/invoice-error.webp" alt="" width="401" height="267">
        </div>
        <h1 class="export-title">That didn't work</h1>
        <p class="export-subtitle" id="export-error-message" aria-live="polite">Your invoice wasn't created. Try again.</p>
        <div class="export-actions">
          <a href="index.html" class="btn btn--primary" id="export-try-again">Try again</a>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/export.js"></script>
</body>
</html>
