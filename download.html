<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var path = window.location.pathname || '';
      if (path.indexOf('/invoice-app') === 0) {
        var base = document.createElement('base');
        base.href = '/invoice-app/';
        document.head.insertBefore(base, document.head.firstChild);
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="assets/img/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="shortcut icon" href="assets/img/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="Invoce">
  <link rel="manifest" href="assets/img/site.webmanifest">
  <title>Invoice ready – Invoce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&display=block">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
  <a href="#export-ready-main" class="skip-link">Skip to main content</a>
  <div class="page-surface export-page">
    <main class="export-main" id="export-ready-main" role="main">
      <div class="export-state-content export-ready-content">
        <a href="index.html" class="export-logo-link" aria-label="Invoce home">
          <img class="export-logo" src="assets/img/Logotype.svg" alt="Invoce" width="140" height="40">
        </a>
        <div class="export-illustration" aria-hidden="true">
          <img src="assets/img/invoice-sparkle.webp" alt="" width="401" height="267">
        </div>
        <h1 class="export-title">Invoice ready</h1>
        <p class="export-subtitle">You can download your invoice now.</p>
        <div class="export-actions">
          <button type="button" class="btn btn--primary" id="export-download-xml" aria-label="Download XML invoice">Download XML</button>
          <button type="button" class="btn btn--primary" id="export-download-pdf" aria-label="Download PDF invoice">Download PDF</button>
        </div>
        <p class="export-secondary-prompt">Let's create a new invoice?</p>
        <div class="export-actions export-actions-secondary">
          <a href="index.html" class="btn btn--secondary" id="export-new-invoice">New invoice</a>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.0.0/jspdf.umd.min.js" integrity="sha384-Txk19yEeCMkbRY2E0XKauFj7VouwVgj6K4AWVQ6QkUnxsMCBFVW8DKxLFH1350sC" crossorigin="anonymous"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/calc.js"></script>
  <script src="assets/js/validation.js"></script>
  <script src="assets/js/xml.js"></script>
  <script src="assets/js/pdf-fonts.js"></script>
  <script src="assets/js/pdf.js"></script>
  <script src="assets/js/export.js"></script>
</body>
</html>
